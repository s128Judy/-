<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>石室灵玄 · 数刻千秋 | 画像砖神异文游</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Serif SC', 'Times New Roman', '宋体', serif;
            background-color: #faf3e0;
            min-height: 100vh;
            position: relative;
            color: #3e2c23;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://i.imgs.ovh/2026/03/22/OD7Qmc.jpeg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            opacity: 0.2;
            pointer-events: none;
            z-index: 0;
        }

        .app-layout {
            display: flex;
            max-width: 1600px;
            margin: 0 auto;
            padding: 1rem;
            gap: 1.5rem;
            position: relative;
            z-index: 2;
        }

        .main-content { flex: 3; min-width: 0; }
        .sidebar { flex: 1; min-width: 280px; background: rgba(249, 241, 229, 0.94); backdrop-filter: blur(4px); border-radius: 48px 16px 48px 16px; border: 1px solid #e2cfaa; padding: 1.2rem; height: fit-content; position: sticky; top: 1rem; box-shadow: 0 8px 20px rgba(0,0,0,0.1); }

        .card { background: rgba(253, 248, 238, 0.94); backdrop-filter: blur(2px); border-radius: 48px 16px 48px 16px; box-shadow: 0 12px 28px -8px rgba(0,0,0,0.2); border: 1px solid #e2cfaa; padding: 1.5rem; margin-bottom: 1.5rem; }

        .location-bar { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 1.5rem; background: #efe1ca; padding: 0.8rem; border-radius: 60px; justify-content: center; }
        .location-btn { background: #fcf3e4; border: 1px solid #cfb787; padding: 0.4rem 1.2rem; border-radius: 40px; cursor: pointer; transition: all 0.2s; }
        .location-btn.active { background: #bc8f6b; color: white; border-color: #9b6e48; }

        .game-log { background: #f6efdf; border-radius: 32px; padding: 1rem; height: 280px; overflow-y: auto; font-size: 0.9rem; line-height: 1.5; margin-bottom: 1rem; border-left: 8px solid #c7a66b; }

        .options-area { display: flex; gap: 12px; flex-wrap: wrap; margin: 1rem 0; }
        .option-btn { flex: 1; background: #e8d7be; border: none; padding: 0.7rem; border-radius: 40px; cursor: pointer; font-family: inherit; font-weight: 500; transition: all 0.2s; font-size: 0.85rem; }
        .option-btn:hover { background: #dac294; transform: translateY(-2px); }

        .custom-action { display: flex; gap: 10px; margin-top: 10px; }
        .custom-action input { flex: 1; padding: 0.6rem; border-radius: 40px; border: 1px solid #e2cfaa; background: #fffcf5; }

        .btn { background: #e8d7be; border: none; padding: 0.5rem 1.2rem; border-radius: 40px; cursor: pointer; font-family: inherit; }
        .btn-primary { background: #bc8f6b; color: white; }

        .status-bar { display: flex; justify-content: space-between; margin-bottom: 1rem; gap: 8px; flex-wrap: wrap; align-items: center; }
        .badge { background: #efe1ca; padding: 4px 12px; border-radius: 30px; font-size: 0.75rem; }

        /* 侧边栏剧情样式 */
        .storyline-item { background: #f6efdf; margin-bottom: 1rem; border-radius: 28px; padding: 0.8rem; border-left: 4px solid #d9b48b; transition: all 0.2s; }
        .storyline-item.unlocked { background: #efe1ca; border-left-color: #bc8f6b; }
        .story-title { font-weight: bold; display: flex; justify-content: space-between; align-items: center; }
        .progress-badge { font-size: 0.7rem; background: #e8d7be; padding: 2px 8px; border-radius: 30px; }
        .story-desc { font-size: 0.75rem; color: #6f4e38; margin-top: 6px; }
        .unlock-btn { background: #bc8f6b; border: none; color: white; padding: 4px 10px; border-radius: 30px; font-size: 0.7rem; margin-top: 8px; cursor: pointer; width: 100%; }

        /* 智能检索面板 */
        .search-panel { background: #f9efdf; border-radius: 32px; padding: 1rem; margin-bottom: 1rem; border: 1px solid #e2cfaa; }
        .search-input { width: 100%; padding: 0.6rem; border-radius: 40px; border: 1px solid #cfb787; background: #fffcf5; font-size: 0.9rem; }
        .search-results { max-height: 200px; overflow-y: auto; margin-top: 10px; font-size: 0.8rem; }
        .search-item { padding: 6px 10px; border-bottom: 1px dashed #e2cfaa; cursor: pointer; transition: background 0.1s; }
        .search-item:hover { background: #e8dac4; }

        /* 词条录独立界面 (模态窗) */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: #fdf8ee; border-radius: 64px 24px 64px 24px; max-width: 800px; width: 90%; max-height: 85%; overflow-y: auto; padding: 1.5rem; border: 2px solid #d9b48b; box-shadow: 0 20px 40px rgba(0,0,0,0.3); }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; border-bottom: 2px solid #e2cfaa; padding-bottom: 0.5rem; }
        .archive-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px,1fr)); gap: 1rem; }
        .archive-card { background: #f6efdf; border-radius: 24px; padding: 0.8rem; border-left: 6px solid #bc8f6b; cursor: pointer; transition: 0.1s; }
        .archive-card:hover { background: #efe1ca; transform: scale(1.01); }
        .close-modal { background: #d9b48b; border: none; font-size: 1.5rem; width: 36px; height: 36px; border-radius: 50%; cursor: pointer; }

        /* 剧情书界面 */
        .storybook-modal .modal-content { max-width: 900px; background: #fcf6e8; }
        .story-chapter { background: #f9efdf; margin-bottom: 1rem; border-radius: 28px; padding: 1rem; border: 1px solid #e2cfaa; }
        .story-chapter h4 { color: #7b4a2e; margin-bottom: 0.5rem; }
    </style>
</head>
<body>
<div class="app-layout">
    <!-- 主游戏区 -->
    <div class="main-content">
        <div class="card">
            <div style="text-align: center; margin-bottom: 0.5rem;">
                <h1 style="color:#5e3a2b;">🏮 石室灵玄 · 数刻千秋 🏮</h1>
                <div style="font-size:0.8rem;">画像砖神异世界 · AI灵境叙事</div>
            </div>
            <div class="status-bar">
                <span class="badge">📍 <span id="currentLocation">天门·双阙</span></span>
                <span class="badge">📜 词条录: <span id="archiveCount">0</span></span>
                <span class="badge">⚡ 灵韵碎片: <span id="shardCount">0</span></span>
                <button class="btn" id="viewArchiveBtn">📚 词条录</button>
                <button class="btn" id="viewStorybookBtn">📖 剧情书</button>
                <button class="btn" id="resetGameBtn">🔄 重置</button>
            </div>

            <!-- 智能检索系统 -->
            <div class="search-panel">
                <input type="text" id="searchInput" class="search-input" placeholder="🔍 智能检索画像砖知识 (如: 西王母, 伏羲女娲, 二桃杀三士, 九尾狐...)" autocomplete="off">
                <div id="searchResults" class="search-results"></div>
            </div>

            <div class="location-bar" id="locationBar"></div>
            <div class="game-log" id="gameLog"><p>✨ 石室初开，仙踪未显。请选择一处砖画秘境...</p></div>
            <div class="options-area" id="optionsArea">
                <button class="option-btn" data-opt="0">🔍 观察砖纹细节</button>
                <button class="option-btn" data-opt="1">🙏 叩问此地神祇</button>
                <button class="option-btn" data-opt="2">🌿 寻觅仙草灵兽</button>
                <button class="option-btn" data-opt="3">📖 聆听石刻往事</button>
            </div>
            <div class="custom-action">
                <input type="text" id="freeAction" placeholder="或输入你的行动（AI会结合画像砖数据库回应）">
                <button class="btn btn-primary" id="submitFree">🎋 天命一掷</button>
            </div>
        </div>
    </div>

    <!-- 侧边栏：主线剧情进度 -->
    <div class="sidebar">
        <h3>📜 天命主线 · 砖魂归位</h3>
        <div id="storylineContainer"></div>
        <div style="margin-top: 1rem; font-size:0.7rem; color:#8b694c;">✨ 与AI互动解锁词条，集齐碎片解锁完整剧情。</div>
    </div>
</div>

<!-- 词条录独立模态窗 -->
<div id="archiveModal" class="modal">
    <div class="modal-content">
        <div class="modal-header"><h2>📖 石室词条录</h2><button class="close-modal" id="closeArchiveModal">&times;</button></div>
        <div id="archiveList" class="archive-grid"></div>
        <div style="margin-top:1rem; text-align:center;"><button class="btn" id="closeArchiveBtn">返回石室</button></div>
    </div>
</div>

<!-- 剧情书模态窗 -->
<div id="storybookModal" class="modal storybook-modal">
    <div class="modal-content">
        <div class="modal-header"><h2>📜 石室剧情书 · 数刻千秋</h2><button class="close-modal" id="closeStorybookModal">&times;</button></div>
        <div id="storybookContent"></div>
        <div style="margin-top:1rem; text-align:center;"><button class="btn" id="closeStorybookBtn">归返石室</button></div>
    </div>
</div>

<script>
    // ======================= 画像砖知识库 (基于用户提供的数据库) =======================
    const BRICK_DB = [
        { title: "西王母", category: "众神谱", content: "西王母戴胜，端坐龙虎座，旁有三足乌、九尾狐、玉兔捣药，昆仑仙境之主。四川、山东、河南等地画像砖常见。" },
        { title: "伏羲", category: "众神谱", content: "人首蛇身，执矩，象征天规，与女娲为创世神。河南南阳、四川等地出土伏羲女娲交尾图。" },
        { title: "女娲", category: "众神谱", content: "人首蛇身，执规，炼石补天，抟土造人。常与伏羲相伴，蛇尾相交。" },
        { title: "东王公", category: "众神谱", content: "东王公，与西王母相对，掌阳气，肩生双翼。山东武梁祠、河南画像石中常见。" },
        { title: "九尾狐", category: "异兽录", content: "九尾狐，祥瑞之兽，帝王仁德则现，西王母使者。《山海经》记载青丘九尾狐。" },
        { title: "三足乌", category: "异兽录", content: "三足乌，日中之精，背负日轮，西王母取食之鸟。汉代画像砖日轮中常见。" },
        { title: "玉兔", category: "异兽录", content: "玉兔执杵捣不死药，居于月宫与昆仑。山东、四川画像砖中玉兔捣药图。" },
        { title: "蟾蜍", category: "异兽录", content: "蟾蜍，月宫精灵，亦为西王母制药灵物。月轮中常与桂树共存。" },
        { title: "朱雀", category: "四神", content: "南方之神，代表夏季，引魂升天。墓门画像砖常刻朱雀。" },
        { title: "青龙", category: "四神", content: "东方之神，护佑升仙，乘龙升仙之兆。河南、山东汉墓多见。" },
        { title: "白虎", category: "四神", content: "西方之神，噬鬼魅，镇墓辟邪。虎食女魃题材见于河南南阳。" },
        { title: "玄武", category: "四神", content: "龟蛇合体，北方之神，司水。伏羲女娲砖中常与玄武共存。" },
        { title: "羽人", category: "仙人", content: "肩生羽翼的仙人，导引升仙，手持仙草。江苏高淳、四川等地画像砖。" },
        { title: "天门", category: "宇宙观", content: "双阙天门，汉人升仙入口，开明兽守卫。河南、四川画像砖中双阙图。" },
        { title: "二桃杀三士", category: "历史传说", content: "晏婴二桃杀三士，智谋与刚烈。山东武梁祠、河南南阳画像石有描绘。" },
        { title: "嫦娥奔月", category: "神话传说", content: "嫦娥窃不死药奔月，化为蟾蜍。河南南阳出土嫦娥奔月画像砖。" },
        { title: "河伯", category: "自然神", content: "河伯出行，鱼车龙驾。河南南阳画像石有河伯出行图。" },
        { title: "雷公", category: "自然神", content: "雷公连鼓，雷神出行图。山东安丘汉墓、河南南阳画像石有雷公车。" },
        { title: "风伯", category: "自然神", content: "风伯吹气，兴风。山东孝堂山画像石有风伯拔屋。" },
        { title: "方相氏", category: "神怪", content: "打鬼驱疫，黄金四目，熊皮。江苏高淳、四川画像砖有方相氏。" },
        { title: "昆仑", category: "仙境", content: "昆仑悬圃，西王母居所，不死药园。河南、山东画像砖中的仙境。" },
        { title: "规矩", category: "宇宙观", content: "伏羲持矩，女娲持规，象征天地法则。汉代画像砖常见。" },
        { title: "后羿", category: "神话传说", content: "后羿射日，除害英雄，与嫦娥为夫妻。" },
        { title: "月宫", category: "宇宙观", content: "月中有蟾蜍、玉兔、桂树，嫦娥所居。" },
        { title: "晏婴", category: "历史人物", content: "齐国贤相，二桃杀三士的主角，机智过人。" },
        { title: "古冶子", category: "历史人物", content: "齐国三勇士之一，二桃杀三士故事中人物。" },
        { title: "应龙", category: "异兽录", content: "有翼之龙，助黄帝杀蚩尤，亦为雨神。" },
        { title: "电母", category: "自然神", content: "闪电之神，常与雷公相伴，画像砖中执鞭。" },
        { title: "雨师", category: "自然神", content: "司雨之神，画像砖中持壶布雨。" }
    ];

    // 记忆系统: 存储对话历史 (最多20条)
    let conversationMemory = []; 

    // 主线剧情 (6个特殊剧情)
    const STORYLINES = [
        { id: "xiwangmu", title: "🏔️ 昆仑谒西王母", desc: "集齐「西王母·九尾狐·三足乌·玉兔·昆仑」5个相关词条，聆听瑶池仙宴。", requiredTags: ["西王母","九尾狐","三足乌","玉兔","昆仑"], progress: 0, unlocked: false, storyContent: "瑶池金母设宴，赐不死药浆，石室中仙乐飘飘，你亲见戴胜西王母，得授长生之秘。" },
        { id: "fuxinwa", title: "🐍 伏羲女娲创世", desc: "集齐「伏羲·女娲·规矩·玄武·天门」5个相关词条，见证宇宙秩序。", requiredTags: ["伏羲","女娲","规矩","玄武","天门"], progress: 0, unlocked: false, storyContent: "伏羲女娲蛇尾相交，手持规矩，定天地四方，你立身宇宙之轴，感悟阴阳。" },
        { id: "erchaosanshi", title: "⚔️ 二桃杀三士", desc: "集齐「二桃杀三士·晏婴·古冶子·公孙接·田开疆」5个相关词条，重演悲壮抉择。", requiredTags: ["二桃杀三士","晏婴","古冶子","公孙接","田开疆"], progress: 0, unlocked: false, storyContent: "二桃三士，英魂不灭。你亲历智谋与气节之辩，可改写结局或感悟忠义。" },
        { id: "changebenyue", title: "🌙 嫦娥奔月", desc: "集齐「嫦娥·后羿·不死药·蟾蜍·月宫」5个词条，飞升月阙。", requiredTags: ["嫦娥","后羿","不死药","蟾蜍","月宫"], progress: 0, unlocked: false, storyContent: "碧海青天，嫦娥吞药飞升。月宫桂影下，玉兔捣药，你窥见寂寞与永恒。" },
        { id: "shenshou", title: "🦊 祥瑞百兽来朝", desc: "集齐「九尾狐·三足乌·玉兔·蟾蜍·青龙」5个瑞兽词条，百兽率舞。", requiredTags: ["九尾狐","三足乌","玉兔","蟾蜍","青龙"], progress: 0, unlocked: false, storyContent: "祥瑞汇聚，百兽率舞，凤凰来翔。石室灵光万丈，你受天命加身。" },
        { id: "leishen", title: "⛈️ 雷公电母出行", desc: "集齐「雷公·电母·风伯·雨师·应龙」5个神祇词条，观天象威仪。", requiredTags: ["雷公","电母","风伯","雨师","应龙"], progress: 0, unlocked: false, storyContent: "雷车隆隆，电鞭划空，风伯扬尘，雨师布泽。你登云车同游，掌风雨之权。" }
    ];

    // 全局状态
    let currentLocation = "天门·双阙";
    let gameLogs = ["✨ 石室初开，仙踪未显。请选择一处砖画秘境..."];
    let archiveEntries = [];   // 词条收集 { title, category, content }
    let unlockedTitles = new Set();
    let shardCount = 0;

    // 辅助: 存储/加载
    function saveGame() { localStorage.setItem("shishi_save_v2", JSON.stringify({ currentLocation, gameLogs, archiveEntries, shardCount, unlockedTitles: Array.from(unlockedTitles), storylineProgress: STORYLINES.map(s=>({unlocked:s.unlocked, progress:s.progress})) })); }
    function loadGame() {
        let raw = localStorage.getItem("shishi_save_v2");
        if(raw) try {
            let d = JSON.parse(raw);
            currentLocation = d.currentLocation || "天门·双阙";
            gameLogs = d.gameLogs || ["✨ 石室初开..."];
            archiveEntries = d.archiveEntries || [];
            shardCount = d.shardCount || 0;
            if(d.unlockedTitles) d.unlockedTitles.forEach(t=>unlockedTitles.add(t));
            if(d.storylineProgress) d.storylineProgress.forEach((p,i)=>{ if(STORYLINES[i]){ STORYLINES[i].unlocked=p.unlocked; STORYLINES[i].progress=p.progress; } });
            updateUI();
        }catch(e){}
    }

    function addArchiveEntry(title, category, content) {
        if(unlockedTitles.has(title)) return false;
        unlockedTitles.add(title);
        archiveEntries.push({ title, category, content: content || (BRICK_DB.find(b=>b.title===title)?.content || "石室灵韵所载") });
        shardCount++;
        updateArchiveUI();
        addGameMessage(`📖 石书新录：「${title}」(${category})，灵韵碎片+1`, true);
        updateAllStorylineProgress();
        saveGame();
        return true;
    }

    function updateAllStorylineProgress() {
        for(let st of STORYLINES) {
            if(st.unlocked) continue;
            let matched = st.requiredTags.filter(tag=>unlockedTitles.has(tag)).length;
            st.progress = matched;
            if(matched >= st.requiredTags.length && !st.unlocked) {
                st.unlocked = true;
                addGameMessage(`🌟 天命昭彰！主线「${st.title}」已解锁！${st.storyContent}`, true);
                shardCount += 3;
                saveGame();
            }
        }
        renderStorylineSidebar();
        updateArchiveUI();
    }

    function addGameMessage(msg, isSystem=true) { gameLogs.push(`${isSystem?"✨":"🎋"} ${msg}`); if(gameLogs.length>60) gameLogs.shift(); document.getElementById("gameLog").innerHTML = gameLogs.map(m=>`<p>${m}</p>`).join(''); document.getElementById("gameLog").scrollTop = document.getElementById("gameLog").scrollHeight; }

    function updateUI() {
        document.getElementById("currentLocation").innerText = currentLocation;
        document.getElementById("archiveCount").innerText = archiveEntries.length;
        document.getElementById("shardCount").innerText = shardCount;
        document.getElementById("gameLog").innerHTML = gameLogs.map(m=>`<p>${m}</p>`).join('');
        renderLocationButtons();
        renderStorylineSidebar();
    }

    function renderLocationButtons() {
        let locs = ["天门·双阙","昆仑·瑶池","人间·百戏","伏羲女娲境"];
        let bar = document.getElementById("locationBar");
        bar.innerHTML = locs.map(l=>`<div class="location-btn ${currentLocation===l?'active':''}" data-loc="${l}">${l}</div>`).join('');
        document.querySelectorAll(".location-btn").forEach(btn=>btn.addEventListener("click",()=>{ currentLocation=btn.dataset.loc; updateUI(); addGameMessage(`🏔️ 移步「${currentLocation}」，石纹幽然。`,true); saveGame(); }));
    }

    function renderStorylineSidebar() {
        let container = document.getElementById("storylineContainer");
        container.innerHTML = STORYLINES.map((st,idx)=>`<div class="storyline-item ${st.unlocked?'unlocked':'locked'}"><div class="story-title"><span>${st.title}</span><span class="progress-badge">${st.progress}/${st.requiredTags.length}</span></div><div class="story-desc">${st.desc}</div>${!st.unlocked?`<div style="font-size:0.65rem;">进度 ${Math.floor(st.progress/st.requiredTags.length*100)}%</div>`:`<button class="unlock-btn" data-idx="${idx}">📜 重演剧情</button>`}</div>`).join('');
        document.querySelectorAll(".unlock-btn").forEach(btn=>btn.addEventListener("click",(e)=>{ let idx=btn.dataset.idx; if(STORYLINES[idx]?.unlocked) addGameMessage(`🏮【特殊剧情】${STORYLINES[idx].storyContent}`,false); }));
    }

    // 智能检索系统 (基于数据库模糊匹配)
    function searchInDatabase(keyword) {
        if(!keyword.trim()) return [];
        let kw = keyword.toLowerCase();
        return BRICK_DB.filter(entry => entry.title.toLowerCase().includes(kw) || entry.content.toLowerCase().includes(kw) || entry.category.toLowerCase().includes(kw));
    }

    // AI 生成叙事 (结合数据库和对话记忆)
    async function generateAIResponse(userAction) {
        // 记忆维护
        conversationMemory.push({ role: "user", content: userAction });
        if(conversationMemory.length > 20) conversationMemory.shift();
        
        // 从数据库检索相关条目增强提示
        let related = searchInDatabase(userAction).slice(0, 3);
        let dbContext = related.map(r=>`《${r.title}》:${r.content.substring(0,100)}`).join("\n");
        let sysPrompt = `你是《石室灵玄》叙事者，精通汉代画像砖神话、历史、神兽。当前地点:${currentLocation}。画像砖知识库参考:\n${dbContext||"无特定"}\n根据玩家行动生成古雅叙事(150~300字)，并在末尾以「【词条:名称|类别|简介】」格式输出新词条(如果符合数据库知识)。保持神秘古朴风格。`;
        let userMsg = userAction;
        let fakeResponse = simulateNarrative(userAction, related);
        // 尝试提取词条
        let keywordMatch = fakeResponse.match(/【词条:(.*?)\|(.*?)\|(.*?)】/);
        if(keywordMatch) {
            let title = keywordMatch[1].trim(), cat = keywordMatch[2].trim(), desc = keywordMatch[3].trim();
            addArchiveEntry(title, cat, desc);
            fakeResponse = fakeResponse.replace(/【词条:.*?】/, '').trim();
        } else {
            // 自动匹配可能词条
            for(let item of BRICK_DB) {
                if(userAction.includes(item.title) && !unlockedTitles.has(item.title)) {
                    addArchiveEntry(item.title, item.category, item.content);
                    fakeResponse += `\n✨ 灵光乍现，石室铭刻「${item.title}」。`;
                    break;
                }
            }
        }
        conversationMemory.push({ role: "assistant", content: fakeResponse });
        return fakeResponse;
    }

    function simulateNarrative(action, related) {
        let lower = action.toLowerCase();
        if(lower.includes("西王母")) return "西王母戴胜端坐龙虎座，九尾狐摇曳，三足乌盘旋，玉兔捣药声清脆。她赐你一枚不死药果，言「积善者可得长生」。【词条:西王母|众神谱|西王母戴胜，龙虎座，昆仑之主。】";
        if(lower.includes("伏羲")||lower.includes("女娲")) return "人首蛇身的伏羲女娲，手持规矩，蛇尾相交如太极。天地由此开辟，阴阳和合。【词条:伏羲|众神谱|人首蛇身执矩，创世之神。】";
        if(lower.includes("九尾狐")) return "九尾狐通体雪白，九尾摇曳，口衔灵芝。它轻语：「祥瑞之兆，唯有德者见之。」【词条:九尾狐|异兽录|祥瑞之兽，西王母使者。】";
        if(lower.includes("三足乌")) return "三足乌背负日轮，赤羽如火，绕昆仑而飞，为西王母取食。【词条:三足乌|异兽录|日中之精，西王母取食之鸟。】";
        if(lower.includes("嫦娥")||lower.includes("奔月")) return "嫦娥吞不死药，身轻如烟，飞向月宫。月中有蟾蜍与桂树，清冷寂寥。【词条:嫦娥奔月|神话传说|嫦娥窃药奔月，化为蟾蜍。】";
        if(lower.includes("二桃")||lower.includes("三士")) return "古冶子、公孙接、田开疆三人争桃，羞愧自刎。晏婴之智，士人之节，令人扼腕。【词条:二桃杀三士|历史传说|晏婴以二桃除三士。】";
        if(lower.includes("羽人")) return "羽人遍体生毛，肩生双翼，持仙草引你升天，云气缭绕，似入仙境。【词条:羽人|仙人|导引升天的仙人。】";
        if(lower.includes("雷公")) return "雷公连鼓，轰雷掣电，天威浩荡，驱邪逐疫。【词条:雷公|自然神|雷神连鼓，出行驱疫。】";
        return `你在${currentLocation}，轻抚砖纹，隐约见石刻流转：${related.length?related[0].title+"的传说" : "仙人神兽"}浮现眼前。灵光一闪，新的知识镌刻石壁。【词条:画像砖灵韵|砖画技艺|汉代画像砖，刻石为卷，神异万象。】`;
    }

    // 词条录界面填充 + 点击跳转详情
    function renderArchiveModal() {
        let container = document.getElementById("archiveList");
        if(archiveEntries.length===0) { container.innerHTML="<div style='text-align:center'>📭 暂无词条，踏入石室探索吧</div>"; return; }
        container.innerHTML = archiveEntries.map(entry => `<div class="archive-card" data-title="${entry.title}"><strong>🏷️ ${entry.title}</strong><br><small style="color:#a0724a;">${entry.category}</small><p style="font-size:0.75rem; margin-top:5px;">${entry.content.substring(0,80)}${entry.content.length>80?'…':''}</p></div>`).join('');
        document.querySelectorAll(".archive-card").forEach(card=>card.addEventListener("click",()=>{
            let title = card.dataset.title;
            let found = archiveEntries.find(e=>e.title===title);
            if(found) alert(`「${found.title}」\n类别：${found.category}\n\n${found.content}`);
        }));
    }

    // 剧情书完整内容
    function renderStorybookModal() {
        let container = document.getElementById("storybookContent");
        let chapters = STORYLINES.map(st => `<div class="story-chapter"><h4>${st.title}</h4><p>${st.desc}</p><p><strong>解锁条件：</strong>${st.requiredTags.join("、")}</p><p><strong>剧情：</strong>${st.storyContent}</p><p><em>状态：${st.unlocked?"✅ 已解锁":"🔒 未解锁 (进度 "+st.progress+"/"+st.requiredTags.length+")"}</em></p></div>`).join('');
        let totalUnlocked = STORYLINES.filter(s=>s.unlocked).length;
        container.innerHTML = `<div style="margin-bottom:1rem;"><h3>📜 数刻千秋 · 总卷</h3><p>已解锁主线: ${totalUnlocked}/${STORYLINES.length} | 灵韵碎片: ${shardCount}</p></div>${chapters}`;
    }

    // 事件绑定与初始化
    async function processUserAction(action) {
        if(!action.trim()) return;
        addGameMessage(`你在「${currentLocation}」: ${action}`, false);
        let response = await generateAIResponse(action);
        addGameMessage(response, false);
        saveGame();
        updateArchiveUI();
    }

    function updateArchiveUI() {
        document.getElementById("archiveCount").innerText = archiveEntries.length;
        document.getElementById("shardCount").innerText = shardCount;
    }

    // 智能检索实时显示
    function setupSearch() {
        let input = document.getElementById("searchInput");
        let resultsDiv = document.getElementById("searchResults");
        input.addEventListener("input", () => {
            let kw = input.value.trim();
            if(!kw) { resultsDiv.innerHTML = ""; return; }
            let hits = searchInDatabase(kw);
            if(hits.length===0) { resultsDiv.innerHTML = "<div>未找到相关砖文</div>"; return; }
            resultsDiv.innerHTML = hits.map(h=>`<div class="search-item" data-title="${h.title}">📜 <strong>${h.title}</strong> (${h.category})<br><span style="font-size:0.7rem;">${h.content.substring(0,60)}…</span></div>`).join('');
            document.querySelectorAll(".search-item").forEach(item=>item.addEventListener("click",()=>{
                let title = item.dataset.title;
                let found = BRICK_DB.find(b=>b.title===title);
                if(found) alert(`「${found.title}」\n类别：${found.category}\n\n${found.content}`);
                else alert("详卷待考");
            }));
        });
    }

    window.onload = () => {
        loadGame();
        setupSearch();
        renderLocationButtons();
        renderStorylineSidebar();
        document.getElementById("submitFree").onclick = () => { let inp = document.getElementById("freeAction"); if(inp.value.trim()) processUserAction(inp.value.trim()); inp.value=""; };
        document.querySelectorAll(".option-btn").forEach(btn=>{ btn.onclick = () => { let acts = [`观察${currentLocation}砖纹细节，寻找隐藏神兽`, `叩问${currentLocation}主神，请求神谕`, `在${currentLocation}寻觅仙草灵兽`, `聆听${currentLocation}石刻往事`]; processUserAction(acts[parseInt(btn.dataset.opt)]); }; });
        document.getElementById("resetGameBtn").onclick = () => { if(confirm("重置将清空所有进度")){ localStorage.removeItem("shishi_save_v2"); location.reload(); } };
        document.getElementById("viewArchiveBtn").onclick = () => { renderArchiveModal(); document.getElementById("archiveModal").style.display="flex"; };
        document.getElementById("viewStorybookBtn").onclick = () => { renderStorybookModal(); document.getElementById("storybookModal").style.display="flex"; };
        document.getElementById("closeArchiveModal").onclick = () => document.getElementById("archiveModal").style.display="none";
        document.getElementById("closeArchiveBtn").onclick = () => document.getElementById("archiveModal").style.display="none";
        document.getElementById("closeStorybookModal").onclick = () => document.getElementById("storybookModal").style.display="none";
        document.getElementById("closeStorybookBtn").onclick = () => document.getElementById("storybookModal").style.display="none";
        window.onclick = (e) => { if(e.target.classList.contains("modal")) e.target.style.display="none"; };
    };
</script>
</body>
